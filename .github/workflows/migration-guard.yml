name: Migration Guard

on:
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'

jobs:
  guard:
    name: л§Ҳмқҙк·ёл Ҳмқҙм…ҳ м•Ҳм „м„ұ кІҖмӮ¬
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # PR м „мІҙ нһҲмҠӨнҶ лҰ¬ н•„мҡ” (base л№„көҗ)
          fetch-depth: 0

      - name: ліҖкІҪлҗң л§Ҳмқҙк·ёл Ҳмқҙм…ҳ нҢҢмқј нғҗм§Җ
        id: detect
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}

          CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- 'supabase/migrations/*.sql')
          echo "changed_files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED"

      - name: кё°мЎҙ л§Ҳмқҙк·ёл Ҳмқҙм…ҳ мҲҳм • м—¬л¶Җ кІҖмӮ¬ (BREAKING)
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}

          MODIFIED=$(git diff --name-only "$BASE" "$HEAD" -- 'supabase/migrations/*.sql' \
            | xargs -r -I{} sh -c 'git show "$0":"{}" > /dev/null 2>&1 && echo "{}"' "$BASE")

          if [ -n "$MODIFIED" ]; then
            echo "::error::кё°мЎҙ л§Ҳмқҙк·ёл Ҳмқҙм…ҳ нҢҢмқјмқҙ мҲҳм •лҗҳм—ҲмҠөлӢҲлӢӨ:"
            echo "$MODIFIED"
            echo ""
            echo "л§Ҳмқҙк·ёл Ҳмқҙм…ҳмқҖ м¶”к°Җ м „мҡ©(append-only)мқҙм–ҙм•ј н•©лӢҲлӢӨ."
            echo "ліҖкІҪмқҙ н•„мҡ”н•ҳл©ҙ мғҲ л§Ҳмқҙк·ёл Ҳмқҙм…ҳ нҢҢмқјмқ„ мғқм„ұн•ҳм„ёмҡ”."
            exit 1
          fi
          echo "кё°мЎҙ л§Ҳмқҙк·ёл Ҳмқҙм…ҳ мҲҳм • м—ҶмқҢ вҖ” OK"

      - name: мӢ к·ң л§Ҳмқҙк·ёл Ҳмқҙм…ҳ нҢҢмқјлӘ… нҳ•мӢқ кІҖмӮ¬
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}

          NEW=$(git diff --name-only --diff-filter=A "$BASE" "$HEAD" -- 'supabase/migrations/*.sql')

          if [ -z "$NEW" ]; then
            echo "мӢ к·ң л§Ҳмқҙк·ёл Ҳмқҙм…ҳ м—ҶмқҢ вҖ” кұҙл„ҲлңҖ"
            exit 0
          fi

          FAIL=0
          for f in $NEW; do
            BASENAME=$(basename "$f")
            # нҳ•мӢқ: NNN_description.sql (мҲ«мһҗ м ‘л‘җм–ҙ н•„мҲҳ)
            if ! echo "$BASENAME" | grep -qE '^[0-9]+_[a-z0-9_]+\.sql$'; then
              echo "::error file=$f::нҢҢмқјлӘ… нҳ•мӢқ мҳӨлҘҳ: '$BASENAME'"
              echo "  мҳ¬л°”лҘё нҳ•мӢқ: 043_my_change.sql (мҶҢл¬ёмһҗ + м–ёлҚ”мҠӨмҪ”м–ҙ)"
              FAIL=1
            fi
          done

          [ "$FAIL" -eq 0 ] && echo "нҢҢмқјлӘ… нҳ•мӢқ вҖ” OK"
          exit $FAIL

      - name: GRANT лҲ„лқҪ кІҖмӮ¬
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}

          NEW=$(git diff --name-only --diff-filter=A "$BASE" "$HEAD" -- 'supabase/migrations/*.sql')

          if [ -z "$NEW" ]; then
            echo "мӢ к·ң л§Ҳмқҙк·ёл Ҳмқҙм…ҳ м—ҶмқҢ вҖ” кұҙл„ҲлңҖ"
            exit 0
          fi

          FAIL=0
          for f in $NEW; do
            # CREATE TABLEмқҙ нҸ¬н•Ёлҗң нҢҢмқјм—җлҠ” GRANTк°Җ мһҲм–ҙм•ј н•Ё
            if git show "$HEAD:$f" | grep -qi 'CREATE TABLE'; then
              if ! git show "$HEAD:$f" | grep -qi 'GRANT.*TO.*authenticated'; then
                echo "::warning file=$f::CREATE TABLE мқҙ мһҲм§Җл§Ң GRANT ALL TO authenticated к°Җ м—ҶмҠөлӢҲлӢӨ."
                echo "  нҢҢмқј лҒқм—җ лӢӨмқҢмқ„ м¶”к°Җн•ҳм„ёмҡ”:"
                echo "  GRANT ALL ON <table> TO authenticated, service_role;"
                FAIL=1
              fi
            fi
          done

          [ "$FAIL" -eq 0 ] && echo "GRANT кІҖмӮ¬ вҖ” OK"
          exit $FAIL

      - name: RLS лҲ„лқҪ кІҪкі 
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}

          NEW=$(git diff --name-only --diff-filter=A "$BASE" "$HEAD" -- 'supabase/migrations/*.sql')

          if [ -z "$NEW" ]; then
            exit 0
          fi

          for f in $NEW; do
            if git show "$HEAD:$f" | grep -qi 'CREATE TABLE'; then
              if ! git show "$HEAD:$f" | grep -qi 'ENABLE ROW LEVEL SECURITY'; then
                echo "::warning file=$f::CREATE TABLE мқҙ мһҲм§Җл§Ң ENABLE ROW LEVEL SECURITY к°Җ м—ҶмҠөлӢҲлӢӨ."
              fi
            fi
          done

          echo "RLS кІҖмӮ¬ вҖ” мҷ„лЈҢ (кІҪкі л§Ң, м°ЁлӢЁ м—ҶмқҢ)"
